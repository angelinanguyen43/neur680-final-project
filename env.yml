name: bold5000_dnn
channels:
  - conda-forge # one channel is enough; pytorch builds live here too
dependencies:
  - python=3.10
  - nibabel
  - nilearn>=0.10
  - pybids
  - scikit-learn
  - pandas
  - numpy
  - matplotlib
  - tqdm
  - pytorch # 2.3.0-py*macosx_arm64 with MPS support
  - torchvision
  - transformers
  - jupyterlab
  # ----- OPTIONAL (nice to have, arm64 wheels exist) -----
  - pip
  - pip:
      - brainspace # ← now installed via pip
      # - brainiak # (still only wheels for x86; optional → comment out)
